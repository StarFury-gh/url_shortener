services:
  users_db:
    build: ./infra/db/users
    ports:
      - 5432:5432
    volumes:
      - users_data:/var/lib/postgresql
    networks:
      - users_network

  analytics_db:
    build: ./infra/db/analytics
    ports:
      - 5433:5432
    volumes:
      - analytics_data:/var/lib/postgresql
    networks:
      - analytics_network
      - event_driven

  shortener_db:
    build: ./infra/db/shortener
    ports:
      - 5434:5432
    volumes:
      - shortener_data:/var/lib/postgresql
    networks:
      - shortener_network
      - event_driven

  rabbit:
    build: ./infra/rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - event_driven

networks:
  users_network:
    driver: bridge
  analytics_network:
    driver: bridge
  shortener_network:
    driver: bridge
  event_driven:
    driver: bridge

volumes:
  users_data:
  analytics_data:
  shortener_data:
