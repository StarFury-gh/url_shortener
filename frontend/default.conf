
server {
    root /usr/share/nginx/html;

    gzip on;
    gzip_static on;
    gzip_types application/javascript text/css image/svg+xml;
    gzip_min_length 100;

    brotli on;
    brotli_static on;
    brotli_types application/javascript text/css image/svg+xml;
    brotli_min_length 100;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование

    location /shr/ {
        rewrite ^/shr/(.*) /$1 break;
        proxy_pass http://shortener_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /us/ {
        rewrite ^/us/(.*) /$1 break;
        proxy_pass http://users_service:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /an/ {
        rewrite ^/an/(.*) /$1 break;
        proxy_pass http://analytics_service:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}